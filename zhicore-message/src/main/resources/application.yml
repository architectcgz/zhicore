server:
  port: ${SERVER_PORT:8105}

spring:
  config:
    import:
      - optional:nacos:common.yml?group=ZHICORE-SERVICE&username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: ZHICORE-SERVICE
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    openfeign:
      client:
        config:
          ZhiCore-leaf:
            url: http://localhost:8010
          zhicore-user:
            url: http://localhost:8081
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhicore_message}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MessageHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# 缓存配置
cache:
  ttl:
    entity-detail: 600      # 实体详情缓存 10分钟
    list: 300               # 列表缓存 5分钟
    stats: -1               # 统计数据永久缓存
    session: 604800         # 会话缓存 7天
    offline-message: 604800 # 离线消息 7天

# 消息配置
message:
  max-content-length: 5000
  recall-time-limit-minutes: 2
  offline-message-expire-days: 7
  sentinel:
    enabled: true
    conversation-list-qps: 200
    conversation-detail-qps: 300
    message-history-qps: 250
    unread-count-qps: 400
    warm-up-period-sec: 10

# 日志配置
logging:
  level:
    com.zhicore.message: DEBUG
    com.zhicore.message.infrastructure.repository.mapper: DEBUG
    com.zhicore.api.client: DEBUG
    feign: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true  # 必须启用，Knife4j 依赖此配置
    path: /swagger-ui.html

# Knife4j 配置
knife4j:
  enable: true
  title: 消息服务 API 文档
  version: 1.0.0
  description: 消息服务微服务接口文档，提供私信、会话管理等功能
  setting:
    language: zh_cn  # 中文界面
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
  production: false
