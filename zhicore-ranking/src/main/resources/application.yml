server:
  port: 8108

spring:
  application:
    name: zhicore-ranking
  config:
    import:
      - optional:nacos:common.yml?group=ZHICORE-SERVICE&username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}&refreshEnabled=true
      - optional:nacos:zhicore-ranking.yml?group=ZHICORE-SERVICE&username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: ZHICORE-SERVICE
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  datasource:
    url: ${RANKING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhicore_ranking}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    mongodb:
      uri: mongodb://admin:mongo123456@localhost:27017/zhicore?authSource=admin
      database: zhicore
  sql:
    init:
      mode: always
      schema-locations: classpath:db/ranking-schema.sql

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true  # 必须启用，Knife4j 依赖此配置
    path: /swagger-ui.html

# Knife4j 配置
knife4j:
  enable: true
  title: ${spring.application.name} API 文档
  version: 1.0.0
  description: 排行榜服务接口文档 - 提供文章、创作者、话题的热度排行功能
  setting:
    language: zh_cn  # 中文界面
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
  production: false

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ranking-producer-group
    send-message-timeout: 3000
  consumer:
    group: ranking-consumer-group

# Feign 配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
  sentinel:
    enabled: true

# Sentinel 配置
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
  eager: true

# 排行榜 Sentinel 限流配置
ranking.sentinel:
  hot-posts-qps: 1000    # 热榜查询 QPS 限制
  creator-qps: 500       # 创作者排行 QPS 限制
  topic-qps: 500         # 话题排行 QPS 限制
  warm-up-period-sec: 30  # Warm Up 预热时间（秒），QPS 从 count/3 线性爬升到 count

# 排行榜配置
ranking:
  # 热度计算权重
  weight:
    view: 1.0
    like: 5.0
    comment: 10.0
    favorite: 8.0
  # 时间衰减半衰期（天）
  half-life-days: 7
  # 排行榜默认大小
  default-size: 20
  # 最大排行榜大小
  max-size: 100
  pagination:
    default-size: 20    # 默认分页大小
    max-size: 100       # 最大分页大小
  # 归档配置
  archive:
    # 归档数量限制
    limit: 100
  snapshot:
    refresh-interval: 3600000
    top-size: 10000
  candidate:
    posts:
      enabled: true
      size: 200
      refresh-interval: 60000
      stale-threshold: 180000
  pipeline:
    bucket-window-seconds: 10
    flush-delay-seconds: 10
    flush-interval: 5000
    flush-batch-size: 200
  # 定时任务调度配置（修改后需重启生效）
  scheduler:
    enabled: true
    hot-posts-cron: "0 0 * * * ?"         # 热榜清理与淘汰，每小时
    creator-cron: "0 30 2 * * ?"          # 创作者排行刷新，每日 02:30
    topic-cron: "0 0 3 * * ?"             # 话题排行刷新，每日 03:00
    daily-archive-cron: "0 0 2 * * ?"     # 日榜归档，每日 02:00
    weekly-archive-cron: "0 0 3 ? * MON"  # 周榜归档，每周一 03:00
    monthly-archive-cron: "0 0 4 1 * ?"   # 月榜归档，每月 1 日 04:00

# 日志配置
logging:
  level:
    com.zhicore.ranking: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
