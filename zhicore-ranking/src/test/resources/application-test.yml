server:
  port: 0  # Random port for testing

spring:
  application:
    name: zhicore-ranking
  sql:
    init:
      mode: always
      schema-locations: classpath:db/ranking-schema.sql
  data:
    redis:
      password: ""
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    sentinel:
      enabled: false

# Disable RocketMQ for testing
rocketmq:
  name-server: localhost:9876
  producer:
    group: ranking-producer-group-test
  consumer:
    group: ranking-consumer-group-test

ranking:
  scheduler:
    enabled: false

# Test logging
logging:
  level:
    com.zhicore.ranking: DEBUG

jwt:
  secret: test-jwt-secret-for-ranking-32bytes-min
  access-token-expiration: 7200
  refresh-token-expiration: 604800
