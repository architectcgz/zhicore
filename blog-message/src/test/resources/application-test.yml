server:
  port: 0

spring:
  application:
    name: blog-message-test
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

# 日志配置
logging:
  level:
    com.blog.message: DEBUG
    com.blog.api.client: DEBUG
