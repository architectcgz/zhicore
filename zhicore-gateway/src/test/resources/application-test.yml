# Gateway 测试配置
server:
  port: 0

spring:
  application:
    name: ZhiCore-gateway-test
  cloud:
    nacos:
      discovery:
        enabled: false
    gateway:
      routes:
        - id: protected-test-route
          uri: forward:/__test/protected
          predicates:
            - Path=/api/v1/users/me
        - id: public-test-route
          uri: forward:/__test/public
          predicates:
            - Path=/api/v1/posts/hot

# 禁用 Nacos 配置
  config:
    import: ""

# JWT 测试配置
jwt:
  secret: test-secret-key-for-integration-testing-must-be-at-least-256-bits
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# 灰度发布测试配置
gray-release:
  enabled: false

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
