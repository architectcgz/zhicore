server:
  port: ${SERVER_PORT:8106}

spring:
  config:
    import:
      - optional:nacos:common.yml?group=BLOG_SERVICE&refreshEnabled=true
      - optional:nacos:blog-notification.yml?group=BLOG_SERVICE&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        group: BLOG_SERVICE
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blog_notification}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: NotificationHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.blog.notification.infrastructure.repository.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# RocketMQ配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  consumer:
    group: notification-consumer-group

# 缓存配置
cache:
  ttl:
    unread-count: 300        # 未读计数缓存5分钟
    aggregated-list: 300     # 聚合列表缓存5分钟
    notification-detail: 600 # 通知详情缓存10分钟

# 通知配置
notification:
  aggregation:
    max-actors: 3            # 聚合显示最多3个触发者
    threshold: 2             # 超过2个触发者时聚合显示

# 通知聚合配置（新配置结构）
blog:
  notification:
    aggregation:
      cache:
        # 缓存TTL（秒）
        # 默认值: 300秒（5分钟）
        # 有效范围: 1-3600秒
        # 说明: 控制聚合通知结果在Redis中的缓存时长
        #       较短的TTL = 更多数据库查询但数据更新鲜
        #       较长的TTL = 更少数据库查询但数据可能过时
        ttl: 300
      display:
        # 聚合通知中显示的最大触发者数量
        # 默认值: 3
        # 有效范围: 1-10
        # 说明: 控制聚合通知中显示多少个触发者名称
        #       示例: "张三等5人赞了你的文章" 最多显示3个名字
        #       较高的值 = 更详细但文本更长
        #       较低的值 = 更简洁但细节更少
        max-recent-actors: 3

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true  # 必须启用，Knife4j 依赖此配置
    path: /swagger-ui.html

# Knife4j 配置
knife4j:
  enable: true
  title: 通知服务 API 文档
  version: 1.0.0
  description: 通知服务微服务接口文档，提供系统通知、消息推送等功能
  setting:
    language: zh_cn  # 中文界面
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
  production: false

# 日志配置
logging:
  level:
    com.blog.notification: DEBUG
    org.apache.rocketmq: WARN
