# Notification Service Configuration
# This configuration file is stored in Nacos Config Center

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blog_notification}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# Notification Configuration
notification:
  batch-size: 100
  retention-days: 30
  max-unread: 1000

# Cache TTL Configuration (seconds)
cache:
  ttl:
    entity-detail: 300      # Notification detail cache 5 minutes
    list: 60                # List cache 1 minute
    unread-count: 30        # Unread count cache 30 seconds
