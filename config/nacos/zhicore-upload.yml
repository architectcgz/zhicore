# Upload Service Configuration
# Nacos DataId: zhicore-upload.yml
# Group: ZHICORE-SERVICE

file-upload:
  max-file-size: 52428800
  allowed-image-types:
    - image/jpeg
    - image/jpg
    - image/png
    - image/gif
    - image/webp

upload:
  sentinel:
    enabled: true
    upload-image-qps: 60
    upload-audio-qps: 40
    upload-images-batch-qps: 20
    get-file-url-qps: 200
    delete-file-qps: 60
    warm-up-period-sec: 5

file-service:
  client:
    server-url: ${FILE_SERVICE_URL:http://localhost:8089}
    tenant-id: ${FILE_SERVICE_TENANT_ID:zhicore}
    connect-timeout: 10000
    read-timeout: 30000
    max-connections: 50
    custom-domain: ${FILE_SERVICE_CUSTOM_DOMAIN:}
    cdn-domain: ${FILE_SERVICE_CDN_DOMAIN:}
    max-retries: 3
    retry-delay-ms: 1000
