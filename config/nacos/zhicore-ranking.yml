# Ranking Service Configuration
# Nacos DataId: zhicore-ranking.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhicore_ranking}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

ranking:
  top-n: 100
  update-interval-minutes: 10
  score-decay-days: 7
  dimensions:
    - hot
    - new
    - trending

cache:
  ttl:
    ranking-list: 600
    user-rank: 300
