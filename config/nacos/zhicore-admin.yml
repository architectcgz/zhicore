# Admin Service Configuration
# Nacos DataId: zhicore-admin.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_admin}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

admin:
  super-admin-ids:
    - "1"
  audit-log-retention-days: 90
  operation-timeout-seconds: 30
  sentinel:
    enabled: true
    user-list-qps: 5000
    post-list-qps: 5000
    comment-list-qps: 5000
    report-list-qps: 5000
    warm-up-period-sec: 0

cache:
  ttl:
    admin-info: 1800
    permission: 3600
