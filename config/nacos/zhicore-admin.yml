# Admin Service Configuration
# Nacos DataId: zhicore-admin.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_admin}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

admin:
  super-admin-ids:
    - "1"
  audit-log-retention-days: 90
  operation-timeout-seconds: 30

cache:
  ttl:
    admin-info: 1800
    permission: 3600
