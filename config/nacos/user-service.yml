# ===========================================
# User Service 配置
# Nacos DataId: user-service.yml
# Group: ZHICORE-SERVICE
# ===========================================

server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_user}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: UserServiceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ZhiCore.user.infrastructure.repository.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: user-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# JWT 配置已移至 common.yml，所有服务共享统一配置
# 缓存配置
cache:
  ttl:
    entity-detail: 600
    list: 300
    stats: -1
    session: 604800

# 日志配置
logging:
  level:
    com.ZhiCore.user: DEBUG
    com.ZhiCore.user.infrastructure.repository.mapper: DEBUG
