# ZhiCore ID Generator Service Configuration
# Nacos DataId: zhicore-id-generator.yml
# Group: ZHICORE-SERVICE

id-generator:
  client:
    server-url: ${ID_GENERATOR_SERVER_URL:http://localhost:8011}
    connect-timeout-ms: ${ID_GENERATOR_CONNECT_TIMEOUT:5000}
    read-timeout-ms: ${ID_GENERATOR_READ_TIMEOUT:10000}
    max-retries: ${ID_GENERATOR_MAX_RETRIES:3}
    buffer-size: ${ID_GENERATOR_BUFFER_SIZE:100}
    refill-threshold: ${ID_GENERATOR_REFILL_THRESHOLD:20}
    batch-fetch-size: ${ID_GENERATOR_BATCH_FETCH_SIZE:50}
    async-refill: ${ID_GENERATOR_ASYNC_REFILL:true}
    buffer-enabled: ${ID_GENERATOR_BUFFER_ENABLED:true}
  sentinel:
    enabled: true
    snowflake-qps: 500
    batch-snowflake-qps: 200
    segment-qps: 300
    warm-up-period-sec: 5

logging:
  level:
    com.ZhiCore.idgenerator: ${LOG_LEVEL_ID_GENERATOR:INFO}
    com.platform.idgen.client: ${LOG_LEVEL_ID_CLIENT:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: zhicore-id-generator
      version: ${spring.application.version:1.0.0}

knife4j:
  enable: true
  setting:
    language: zh_CN
  production: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
