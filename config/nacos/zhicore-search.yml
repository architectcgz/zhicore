# Search Service Configuration
# Nacos DataId: zhicore-search.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_search}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}
  index:
    post: ZhiCore_post
    user: ZhiCore_user

search:
  max-results: 100
  highlight-pre-tag: "<em>"
  highlight-post-tag: "</em>"
  timeout-seconds: 5

cache:
  ttl:
    search-result: 300
    hot-keywords: 3600
