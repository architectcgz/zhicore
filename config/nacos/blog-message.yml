# Message Service Configuration
# This configuration file is stored in Nacos Config Center

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_message}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# Message Configuration
message:
  max-content-length: 5000
  recall-time-limit-minutes: 2
  offline-message-expire-days: 7

# Cache TTL Configuration (seconds)
cache:
  ttl:
    entity-detail: 600      # Entity detail cache 10 minutes
    list: 300               # List cache 5 minutes
    stats: -1               # Stats data permanent cache
    session: 604800         # Session cache 7 days
    offline-message: 604800 # Offline message 7 days
