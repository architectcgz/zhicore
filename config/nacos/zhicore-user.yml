# User Service Configuration
# Nacos DataId: zhicore-user.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhicore_user}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

cache:
  ttl:
    entity-detail: 600
    list: 300
    stats: -1
    session: 604800

follow:
  max-following: 5000
  lock-timeout: 5

check-in:
  reward:
    base: 10
    continuous-bonus: 5
    max-continuous: 7

user:
  sentinel:
    enabled: true
    user-detail-qps: 250
    user-simple-qps: 400
    batch-user-simple-qps: 200
    stranger-message-setting-qps: 300
    followers-qps: 150
    followings-qps: 150
    follow-stats-qps: 250
    is-following-qps: 400
    check-in-stats-qps: 200
    monthly-check-in-bitmap-qps: 150
    blocked-users-qps: 150
    is-blocked-qps: 300
    query-users-qps: 100
    warm-up-period-sec: 10
