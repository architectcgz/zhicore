# Notification Service Configuration
# Nacos DataId: zhicore-notification.yml
# Group: ZHICORE-SERVICE

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_notification}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

notification:
  batch-size: 100
  retention-days: 30
  max-unread: 1000
  preference:
    default-timezone: Asia/Shanghai

zhicore:
  notification:
    broadcast:
      shard-size: 2000
      priority-push-threshold: 100000
    digest:
      default-delay-minutes: 30

cache:
  ttl:
    entity-detail: 300
    list: 60
    unread-count: 30
