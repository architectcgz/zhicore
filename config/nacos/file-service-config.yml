# ===========================================
# File Service 共享配置
# Nacos DataId: file-service-config.yml
# Group: BLOG_SERVICE
# ===========================================
# 
# 此配置文件为所有使用 File Service 的微服务提供统一配置
# 包括：blog-user, blog-post, blog-comment 等需要文件上传功能的服务
#
# 使用方式：
# 在服务的 application.yml 中添加：
# spring:
#   config:
#     import: 
#       - optional:nacos:file-service-config.yml?group=BLOG_SERVICE&refreshEnabled=true
#       - optional:nacos:{service-name}.yml?group=BLOG_SERVICE&refreshEnabled=true
#

# File Service 客户端配置
file-service:
  client:
    # File Service 服务地址
    # 开发环境：http://localhost:8089
    # Docker环境：http://file-service:8089
    # 生产环境：http://file-service.production:8089
    server-url: ${FILE_SERVICE_URL:http://file-service:8089}
    
    # 租户ID - 用于多租户隔离
    tenant-id: ${FILE_SERVICE_TENANT_ID:blog}
    
    # 静态令牌（可选）
    # 如果不配置，会自动从 Spring Security Context 获取 JWT 令牌
    # token: ${FILE_SERVICE_TOKEN:}
    
    # 连接设置
    connect-timeout: 15000  # 连接超时（毫秒）
    read-timeout: 60000     # 读取超时（毫秒）
    max-connections: 100    # 最大连接数
    
    # 域名设置
    # 自定义域名（可选）- 用于替换返回的文件URL中的域名
    custom-domain: ${FILE_SERVICE_CUSTOM_DOMAIN:}
    
    # CDN域名（推荐配置）- 用于加速公共文件访问
    # 生产环境建议配置CDN域名以提升访问速度
    cdn-domain: ${FILE_SERVICE_CDN_DOMAIN:}
    
    # 重试设置
    max-retries: 5          # 最大重试次数
    retry-delay-ms: 2000    # 重试延迟（毫秒）
    
    # 文件上传配置
    upload:
      # 分片上传阈值（字节）- 大于此值的文件将使用分片上传
      multipart-threshold: 10485760  # 10MB
      
      # 分片大小（字节）
      part-size: 5242880  # 5MB
      
      # 是否启用秒传
      instant-upload-enabled: true
      
      # 是否自动计算文件哈希
      auto-hash: true
    
    # 连接池配置（可选）
    connection-pool:
      max-total: 100
      max-idle: 50
      min-idle: 10
      max-wait-millis: 5000

# 监控配置
management:
  metrics:
    tags:
      file-service-client: enabled
  health:
    file-service:
      enabled: true

# 日志配置
logging:
  level:
    com.platform.fileservice.client: INFO
    com.platform.fileservice.starter: INFO

