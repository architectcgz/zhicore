# Admin Service Configuration
# This configuration file is stored in Nacos Config Center

# Database Configuration
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_admin}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# Admin Configuration
admin:
  super-admin-ids:
    - "1"
  audit-log-retention-days: 90
  operation-timeout-seconds: 30

# Cache TTL Configuration (seconds)
cache:
  ttl:
    admin-info: 1800        # Admin info cache 30 minutes
    permission: 3600        # Permission cache 1 hour
