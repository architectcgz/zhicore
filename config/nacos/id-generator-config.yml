# ===========================================
# ID Generator 共享配置
# Nacos DataId: id-generator-config.yml
# Group: ZhiCore_SERVICE
# ===========================================
# 
# 此配置文件为所有使用 ID Generator 服务的微服务提供统一配置
# 包括：ZhiCore-notification, ZhiCore-message, ZhiCore-user, ZhiCore-post, 
#       ZhiCore-comment, ZhiCore-search, ZhiCore-ranking, ZhiCore-upload, ZhiCore-admin
#
# 使用方式：
# 在服务的 application.yml 中添加：
# spring:
#   config:
#     import: 
#       - optional:nacos:id-generator-config.yml?group=ZhiCore_SERVICE&refreshEnabled=true
#       - optional:nacos:{service-name}.yml?group=ZhiCore_SERVICE&refreshEnabled=true
#

# ID生成器客户端配置
id-generator:
  client:
    # ID Generator 服务地址
    # 开发环境：http://localhost:8011
    # 生产环境：http://id-generator-service:8011
    server-url: ${ID_GENERATOR_SERVER_URL:http://localhost:8011}
    
    # 请求超时时间（毫秒）
    timeout: ${ID_GENERATOR_TIMEOUT:3000}
    
    # 失败重试次数
    retry-times: ${ID_GENERATOR_RETRY_TIMES:3}
    
    # ID生成模式：snowflake 或 segment
    # snowflake: 雪花算法，适用于大多数场景
    # segment: 号段模式，适用于需要连续ID的场景
    mode: ${ID_GENERATOR_MODE:snowflake}
    
    # 连接池配置（可选）
    connection-pool:
      max-total: 20
      max-idle: 10
      min-idle: 5
      max-wait-millis: 3000

# 监控配置
management:
  metrics:
    tags:
      id-generator-client: enabled
