server:
  port: 8090

spring:
  application:
    name: ZhiCore-migration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZhiCore_user}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MigrationHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6800}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: migration-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# 数据迁移配置（已废弃 - 使用最新数据库）
# migration:
