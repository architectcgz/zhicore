# CDC 配置
cdc:
  enabled: ${CDC_ENABLED:false}
  connector:
    name: ZhiCore-postgres-connector
    database:
      hostname: ${DB_HOST:localhost}
      port: ${DB_PORT:5432}
      user: ${DB_USERNAME:postgres}
      password: ${DB_PASSWORD:postgres123456}
      dbname: ${DB_NAME:ZhiCore_user}
    slot:
      name: ZhiCore_cdc_slot
    publication:
      name: ZhiCore_publication
    tables:
      - post_stats
      - post_likes
      - comment_stats
      - comment_likes
      - user_follow_stats

# 灰度发布配置
gray:
  enabled: ${GRAY_ENABLED:false}
  # 灰度流量比例 (0-100)
  traffic-ratio: ${GRAY_TRAFFIC_RATIO:5}
  # 灰度用户白名单
  whitelist-users: ${GRAY_WHITELIST_USERS:}
  # 灰度用户黑名单
  blacklist-users: ${GRAY_BLACKLIST_USERS:}
  # 数据对账间隔（秒）
  reconciliation-interval: 300
  # 监控告警阈值
  alert:
    error-rate-threshold: 0.01
    latency-threshold-ms: 500

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true  # 必须启用，Knife4j 依赖此配置
    path: /swagger-ui.html

# Knife4j 配置
knife4j:
  enable: true
  title: 运维服务 API 文档
  version: 1.0.0
  description: 运维服务微服务接口文档，提供 CDC 数据同步、灰度发布管理等功能
  setting:
    language: zh_cn  # 中文界面
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

logging:
  level:
    com.ZhiCore.migration: DEBUG
