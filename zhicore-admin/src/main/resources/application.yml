server:
  port: 8109

spring:
  application:
    name: zhicore-admin
  config:
    import:
      - optional:nacos:common.yml?group=ZHICORE_SERVICE&username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}&refreshEnabled=true
      - optional:nacos:zhicore-admin.yml?group=ZHICORE_SERVICE&username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        group: ZHICORE_SERVICE
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhicore_admin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: AdminServiceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhicore.admin.infrastructure.repository.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# Sentinel 配置
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
  eager: true

# Feign 配置
spring.cloud.openfeign:
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 3000
        logger-level: BASIC
      zhicore-user:
        connect-timeout: 3000
        read-timeout: 5000
      zhicore-content:
        connect-timeout: 3000
        read-timeout: 5000
      zhicore-comment:
        connect-timeout: 3000
        read-timeout: 5000
  sentinel:
    enabled: true

# 日志配置
logging:
  level:
    com.zhicore.admin: DEBUG
    com.zhicore.admin.infrastructure.repository.mapper: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Knife4j API 文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true  # 必须启用，Knife4j 依赖此配置
    path: /swagger-ui.html

knife4j:
  enable: true
  title: ${spring.application.name} API 文档
  version: 1.0.0
  description: 管理服务接口文档 - 提供后台管理、内容审核、用户管理等功能
  setting:
    language: zh_cn  # 中文界面
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
  production: false
