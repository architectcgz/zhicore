# ===========================================
# Prometheus Configuration
# ZhiCore Microservices Monitoring
# ===========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ZhiCore-microservices'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 告警规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# 数据采集配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Actuator 端点
  # Gateway Service
  - job_name: 'ZhiCore-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gateway'

  # User Service
  - job_name: 'ZhiCore-user'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'user-service'

  # Content Service
  - job_name: 'ZhiCore-content'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'content-service'

  # Comment Service
  - job_name: 'ZhiCore-comment'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'comment-service'

  # Message Service
  - job_name: 'ZhiCore-message'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'message-service'

  # Notification Service
  - job_name: 'ZhiCore-notification'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'notification-service'

  # Search Service
  - job_name: 'ZhiCore-search'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8086']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'search-service'

  # Ranking Service
  - job_name: 'ZhiCore-ranking'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8087']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ranking-service'

  # Upload Service
  - job_name: 'ZhiCore-upload'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8092']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'upload-service'

  # Admin Service
  - job_name: 'ZhiCore-admin'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8093']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'admin-service'

  # ID Generator Service
  - job_name: 'ZhiCore-id-generator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8088']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'id-generator-service'

  # Ops Service
  - job_name: 'ZhiCore-ops'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8094']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ops-service'

  # Nacos 监控
  - job_name: 'nacos'
    metrics_path: '/nacos/actuator/prometheus'
    static_configs:
      - targets: ['nacos:8848']

  # RocketMQ 监控
  - job_name: 'rocketmq'
    static_configs:
      - targets: ['rocketmq-broker:10911']

  # Elasticsearch 监控
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'

  # SkyWalking OAP 监控
  - job_name: 'skywalking-oap'
    static_configs:
      - targets: ['skywalking-oap:1234']
