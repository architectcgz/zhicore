# RocketMQ Broker Configuration
brokerClusterName=ZhiCoreCluster
brokerName=zhicore-broker-a
brokerId=0
deleteWhen=04
fileReservedTime=48
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH

# NameServer 地址（Docker 网络中使用容器名）
namesrvAddr=zhicore-rocketmq-namesrv:9876

# 监听端口
listenPort=10911

# 当前 zhicore 联调环境已经整体跑在 docker 网络中。
# 如果 broker 继续向 NameServer 注册 127.0.0.1，业务容器会把 broker 解析成自己，
# 导致 outbox、消费和回放链路全部失败。
brokerIP1=shared-rocketmq-broker

# 自动创建 Topic 和 Consumer Group
autoCreateTopicEnable=true
autoCreateSubscriptionGroup=true

# 内存优化配置 (开发环境)
# 减少消息存储的内存映射文件大小
mapedFileSizeCommitLog=104857600
mapedFileSizeConsumeQueue=3000000

# 减少发送线程池大小
sendMessageThreadPoolNums=4
pullMessageThreadPoolNums=4

# 减少查询线程池大小
queryMessageThreadPoolNums=2
adminBrokerThreadPoolNums=4

# 减少客户端管理线程池
clientManageThreadPoolNums=4

# 减少心跳线程池
heartbeatThreadPoolNums=2

# 减少事务消息检查线程池
endTransactionThreadPoolNums=4

# 磁盘使用率告警阈值
diskMaxUsedSpaceRatio=95

# 开启消息索引
messageIndexEnable=true
messageIndexSafe=false

# 减少消息存储的预分配大小
mappedFileSizeCommitLog=104857600
mappedFileSizeConsumeQueue=300000
