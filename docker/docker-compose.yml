# ===========================================
# ZhiCore Microservices Infrastructure (共享模式)
# ===========================================
# 基础服务(PostgreSQL/Redis/Nacos/RocketMQ)已迁移至公共 infra
# 本文件仅保留 ZhiCore 特有服务
#
# 使用方式:
#   1. 先启动共享基础设施:
#      cd infra && docker compose up -d
#   2. 再启动本文件:
#      cd zhicore-microservice/docker && docker compose up -d
#
# 共享服务连接信息:
#   PostgreSQL: shared-postgres:5432 (各服务独立 database)
#   Redis:      shared-redis:6379   / db=1
#   Nacos:      shared-nacos:8848
#   RocketMQ:   shared-rocketmq-namesrv:9876
# ===========================================

services:
  # ===========================================
  # MongoDB - 文档数据库（文章内容存储）
  # ===========================================
  zhicore-mongodb:
    image: mongo:8.0
    container_name: zhicore-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-mongo123456}
      - MONGO_INITDB_DATABASE=zhicore
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongodb-init:/docker-entrypoint-initdb.d:ro
    networks:
      - shared-infra
    command: mongod --auth
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # Mongo Express - MongoDB Web 管理界面
  # ===========================================
  zhicore-mongo-express:
    image: mongo-express:latest
    container_name: zhicore-mongo-express
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:-mongo123456}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-mongo123456}@zhicore-mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-express123456}
    ports:
      - "8091:8081"
    networks:
      - shared-infra
    depends_on:
      zhicore-mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Elasticsearch - 全文搜索引擎
  # ===========================================
  zhicore-elasticsearch:
    image: elasticsearch:8.11.3
    container_name: zhicore-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - cluster.name=zhicore-es-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/plugins:/usr/share/elasticsearch/plugins
    networks:
      - shared-infra
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Kibana - ES 可视化
  # ===========================================
  zhicore-kibana:
    image: kibana:8.11.3
    container_name: zhicore-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://zhicore-elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"
    networks:
      - shared-infra
    depends_on:
      zhicore-elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Prometheus - 监控数据采集
  # ===========================================
  zhicore-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: zhicore-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - shared-infra
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Grafana - 监控可视化
  # ===========================================
  zhicore-grafana:
    image: grafana/grafana:10.2.2
    container_name: zhicore-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123456}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3100
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - shared-infra
    depends_on:
      - zhicore-prometheus
    restart: unless-stopped

# ===========================================
# Networks - 引用共享基础设施网络
# ===========================================
networks:
  shared-infra:
    external: true

# ===========================================
# Volumes
# ===========================================
volumes:
  mongodb_data:
    name: zhicore_mongodb_data
  mongodb_config:
    name: zhicore_mongodb_config
  elasticsearch_data:
    name: zhicore_elasticsearch_data
  prometheus_data:
    name: zhicore_prometheus_data
  grafana_data:
    name: zhicore_grafana_data
