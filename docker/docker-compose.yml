# ===========================================
# Blog Microservices Infrastructure
# ===========================================
# 独立部署: PostgreSQL, Redis, Nacos, RocketMQ, 
#          Elasticsearch, Kibana, Prometheus, Grafana
# ===========================================

services:
  # ===========================================
  # PostgreSQL - 主数据库
  # ===========================================
  blog-postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123456}
      - POSTGRES_DB=blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - blog-network
    command: 
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # Redis - 缓存与会话存储
  # ===========================================
  blog-redis:
    image: redis:7.2-alpine
    container_name: blog-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # MongoDB - 文档数据库（文章内容存储）
  # ===========================================
  blog-mongodb:
    image: mongo:8.0
    container_name: blog-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-mongo123456}
      - MONGO_INITDB_DATABASE=blog
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongodb-init:/docker-entrypoint-initdb.d:ro
    networks:
      - blog-network
    command: mongod --auth
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================
  # Mongo Express - MongoDB Web 管理界面
  # ===========================================
  blog-mongo-express:
    image: mongo-express:latest
    container_name: blog-mongo-express
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:-mongo123456}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-mongo123456}@blog-mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-express123456}
    ports:
      - "8091:8081"
    networks:
      - blog-network
    depends_on:
      blog-mongodb:
        condition: service_healthy
    restart: unless-stopped
  # ===========================================
  # MySQL - Nacos 专用数据库
  # ===========================================
  blog-mysql-nacos:
    image: mysql:8.0
    container_name: blog-mysql-nacos
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123456}
      - MYSQL_DATABASE=nacos
      - MYSQL_USER=nacos
      - MYSQL_PASSWORD=${MYSQL_NACOS_PASSWORD:-nacos123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_nacos_data:/var/lib/mysql
      - ./nacos/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - blog-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===========================================
  # Nacos - 服务注册与配置中心
  # ===========================================
  blog-nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: blog-nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=blog-mysql-nacos
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=nacos
      - MYSQL_SERVICE_PASSWORD=${MYSQL_NACOS_PASSWORD:-nacos123456}
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - JVM_XMS=512m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
    networks:
      - blog-network
    depends_on:
      blog-mysql-nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # RocketMQ NameServer (Blog专用)
  # ===========================================
  blog-rocketmq-namesrv:
    image: apache/rocketmq:4.9.6
    container_name: blog-rocketmq-namesrv
    command: sh mqnamesrv
    environment:
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    ports:
      - "9876:9876"  # Blog RocketMQ NameServer
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===========================================
  # RocketMQ Broker (Blog专用)
  # ===========================================
  blog-rocketmq-broker:
    image: apache/rocketmq:4.9.6
    container_name: blog-rocketmq-broker
    command: sh mqbroker -c /home/rocketmq/rocketmq-4.9.6/conf/broker.conf
    environment:
      - NAMESRV_ADDR=blog-rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Xms512m -Xmx512m -Xmn256m
    ports:
      - "10909:10909"  # Blog RocketMQ Broker VIP
      - "10911:10911"  # Blog RocketMQ Broker Main
      - "10912:10912"  # Blog RocketMQ Broker HA
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-4.9.6/conf/broker.conf
    networks:
      - blog-network
    depends_on:
      blog-rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped


  # ===========================================
  # RocketMQ Dashboard (Blog专用)
  # ===========================================
  blog-rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: blog-rocketmq-dashboard
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m -Drocketmq.namesrv.addr=blog-rocketmq-namesrv:9876
    ports:
      - "8180:8080"  # Blog RocketMQ Dashboard
    networks:
      - blog-network
    depends_on:
      blog-rocketmq-broker:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Elasticsearch - 全文搜索引擎
  # ===========================================
  blog-elasticsearch:
    image: elasticsearch:8.11.3
    container_name: blog-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - cluster.name=blog-es-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/plugins:/usr/share/elasticsearch/plugins
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Kibana - ES 可视化
  # ===========================================
  blog-kibana:
    image: kibana:8.11.3
    container_name: blog-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://blog-elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"
    networks:
      - blog-network
    depends_on:
      blog-elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Prometheus - 监控数据采集
  # ===========================================
  blog-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: blog-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Grafana - 监控可视化
  # ===========================================
  blog-grafana:
    image: grafana/grafana:10.2.2
    container_name: blog-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123456}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3100
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - blog-network
    depends_on:
      - blog-prometheus
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  blog-network:
    name: blog-network
    driver: bridge
    external: false

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    name: blog_postgres_data
  redis_data:
    name: blog_redis_data
  mongodb_data:
    name: blog_mongodb_data
  mongodb_config:
    name: blog_mongodb_config
  mysql_nacos_data:
    name: blog_mysql_nacos_data
  rocketmq_namesrv_logs:
    name: blog_rocketmq_namesrv_logs
  rocketmq_broker_logs:
    name: blog_rocketmq_broker_logs
  rocketmq_broker_store:
    name: blog_rocketmq_broker_store
  elasticsearch_data:
    name: blog_elasticsearch_data
  prometheus_data:
    name: blog_prometheus_data
  grafana_data:
    name: blog_grafana_data
