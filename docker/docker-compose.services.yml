# ===========================================
# ZhiCore Microservices - Application Services (共享模式)
# ===========================================
# 使用方法:
# 1. 先启动共享基础设施: cd infra && docker compose up -d
# 2. 启动 ZhiCore 特有服务: docker compose up -d
# 3. 确保上游 ID Generator Service 已启动 (外部服务，端口 8011)
# 4. 构建服务镜像: docker compose -f docker-compose.services.yml build
# 5. 启动服务: docker compose -f docker-compose.services.yml up -d
# ===========================================
#
# 注意事项:
# - 基础设施(PostgreSQL/Redis/Nacos/RocketMQ)由共享 infra 提供
# - 业务服务同时接入 zhicore-app 和 shared-infra
# - zhicore-id-generator 代理服务由本 compose 管理
# - 上游 ID Generator Service 仍为独立部署外部服务
# - 默认上游地址通过环境变量 UPSTREAM_ID_GENERATOR_SERVER_URL 覆盖
# ===========================================

name: zhicore

services:
  # ===========================================
  # Gateway Service
  # ===========================================
  zhicore-gateway:
    build:
      context: ../zhicore-gateway
      dockerfile: Dockerfile
    container_name: zhicore-gateway
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8000:8000"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # User Service
  # ===========================================
  zhicore-user:
    build:
      context: ../zhicore-user
      dockerfile: Dockerfile
    container_name: zhicore-user
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - ZHICORE_USER_URL=${ZHICORE_USER_URL:-http://zhicore-user:8081}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8081:8081"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Post Service
  # ===========================================
  zhicore-content:
    build:
      context: ../zhicore-content
      dockerfile: Dockerfile
    container_name: zhicore-content
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_NAME=zhicore_content
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_HOST=zhicore-mongodb
      - MONGO_PORT=27017
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8082:8082"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Comment Service
  # ===========================================
  zhicore-comment:
    build:
      context: ../zhicore-comment
      dockerfile: Dockerfile
    container_name: zhicore-comment
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8083
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8083:8083"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # ID Generator Proxy Service
  # ===========================================
  zhicore-id-generator:
    build:
      context: ../zhicore-id-generator
      dockerfile: Dockerfile
    container_name: zhicore-id-generator
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8088
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - NACOS_GROUP=${NACOS_GROUP:-ZHICORE-SERVICE}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - ID_GENERATOR_SERVER_URL=${UPSTREAM_ID_GENERATOR_SERVER_URL:-http://id-generator-server:8011}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8088:8088"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Message Service
  # ===========================================
  zhicore-message:
    build:
      context: ../zhicore-message
      dockerfile: Dockerfile
    container_name: zhicore-message
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8084:8084"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Notification Service
  # ===========================================
  zhicore-notification:
    build:
      context: ../zhicore-notification
      dockerfile: Dockerfile
    container_name: zhicore-notification
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8085
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8085:8085"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Search Service
  # ===========================================
  zhicore-search:
    build:
      context: ../zhicore-search
      dockerfile: Dockerfile
    container_name: zhicore-search
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8086
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - ELASTICSEARCH_HOST=zhicore-elasticsearch
      - ELASTICSEARCH_PORT=9200
      - SPRING_ELASTICSEARCH_URIS=http://zhicore-elasticsearch:9200
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8086:8086"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Ranking Service
  # ===========================================
  zhicore-ranking:
    build:
      context: ../zhicore-ranking
      dockerfile: Dockerfile
    container_name: zhicore-ranking
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8087
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_NAME=zhicore_ranking
      - SPRING_DATA_MONGODB_URI=mongodb://admin:mongo123456@zhicore-mongodb:27017/zhicore?authSource=admin
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAME_SERVER=shared-rocketmq-namesrv:9876
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8087:8087"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # Admin Service
  # ===========================================
  zhicore-admin:
    build:
      context: ../zhicore-admin
      dockerfile: Dockerfile
    container_name: zhicore-admin
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8090
      - NACOS_SERVER_ADDR=shared-nacos:8848
      - NACOS_SERVER=shared-nacos:8848
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=shared-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=shared-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ID_GENERATOR_SERVER_URL=${ID_GENERATOR_SERVER_URL:-http://zhicore-id-generator:8088}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8090:8090"
    networks:
      - zhicore-app
      - shared-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  zhicore-app:
    name: zhicore-app
  shared-infra:
    external: true
