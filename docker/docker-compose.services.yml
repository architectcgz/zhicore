# ===========================================
# ZhiCore Microservices - Application Services
# ===========================================
# 使用方法:
# 1. 先启动基础设施: docker-compose up -d
# 2. 确保 ID Generator Service 已启动 (外部服务，端口 8011)
# 3. 构建服务镜像: docker-compose -f docker-compose.services.yml build
# 4. 启动服务: docker-compose -f docker-compose.services.yml up -d
# ===========================================
#
# 注意事项:
# - ID Generator Service 是独立部署的外部服务
# - 默认地址: http://host.docker.internal:8011
# - 可通过环境变量 ID_GENERATOR_SERVER_URL 覆盖
# ===========================================

services:
  # ===========================================
  # Gateway Service
  # ===========================================
  zhicore-gateway:
    build:
      context: ../zhicore-gateway
      dockerfile: Dockerfile
    container_name: zhicore-gateway
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=zhicore-nacos:8848
      - REDIS_HOST=zhicore-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
      - "8000:8000"
    networks:
      - zhicore-network
    depends_on:
      - zhicore-nacos
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ===========================================
  # User Service
  # ===========================================
  zhicore-user:
    build:
      context: ../zhicore-user
      dockerfile: Dockerfile
    container_name: zhicore-user
