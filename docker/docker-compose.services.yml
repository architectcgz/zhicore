      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
      - NACOS_ADDR=zhicore-nacos:8848
      - POSTGRES_HOST=zhicore-postgres
      - POSTGRES_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=zhicore-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ROCKETMQ_NAMESRV=zhicore-rocketmq-namesrv:9876
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=zhicore-skywalking-oap:11800
    ports:
