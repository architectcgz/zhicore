# ===========================================
# Grafana Dashboards Provisioning
# ===========================================

apiVersion: 1

providers:
  - name: 'Blog Microservices'
    orgId: 1
    folder: 'Blog Microservices'
    folderUid: 'blog-microservices'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
