spring:
  application:
    name: ZhiCore-id-generator-test
  
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# ID Generator Client Configuration (Mock)
id-generator:
  client:
    server-url: http://localhost:8011
    connect-timeout: 5000
    read-timeout: 10000

# Disable Actuator endpoints in tests
management:
  endpoints:
    web:
      exposure:
        include: health

# Disable Knife4j in tests
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
knife4j:
  enable: false

# Logging configuration for tests
logging:
  level:
    com.ZhiCore.idgenerator: DEBUG
    org.springframework.test: INFO
