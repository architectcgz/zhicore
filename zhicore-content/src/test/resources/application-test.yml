# Post Service 测试配置
server:
  port: 0

spring:
  application:
    name: ZhiCore-post-test
  cloud:
    nacos:
      discovery:
        enabled: false
  config:
    import: ""

content:
  mongodb:
    validation:
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# Redis 测试配置
spring.data.redis:
  host: localhost
  port: 6379

# RocketMQ 测试配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: test-producer-group
    send-message-timeout: 3000

# 缓存配置
cache:
  ttl:
    entity-detail: 600
    list: 300
    stats: -1
    null-value: 60

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always

# JWT 测试配置
jwt:
  secret: test-jwt-secret-key-for-unit-testing-only-32chars

# File Service 测试配置
file-service:
  client:
    tenant-id: test-app

# 日志配置
logging:
  level:
    com.ZhiCore: DEBUG
